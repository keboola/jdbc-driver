name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jdbc-driver:
    name: JDBC driver (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['11', '17', '21']
    defaults:
      run:
        working-directory: jdbc-driver
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Unit tests
        run: mvn -B test

      # E2E needs secrets, which are unavailable to PRs from forks. Run only on
      # push or same-repo PRs; fork PRs run unit tests only.
      - name: Check E2E secrets
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          KEBOOLA_TOKEN: ${{ secrets.KEBOOLA_TOKEN }}
        run: |
          if [ -z "$KEBOOLA_TOKEN" ]; then
            echo "::error::KEBOOLA_TOKEN secret is not set — E2E tests cannot run. Configure it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: E2E tests
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: mvn -B verify -Pkeboola-integration
        env:
          KEBOOLA_TOKEN: ${{ secrets.KEBOOLA_TOKEN }}
          KEBOOLA_WORKSPACE: ${{ secrets.KEBOOLA_WORKSPACE }}
          KEBOOLA_BRANCH: ${{ secrets.KEBOOLA_BRANCH }}
          KEBOOLA_HOST: ${{ secrets.KEBOOLA_HOST }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jdbc-test-reports-java${{ matrix.java }}
          path: |
            jdbc-driver/target/surefire-reports/
            jdbc-driver/target/failsafe-reports/
          if-no-files-found: ignore

  vscode-extension:
    name: VSCode extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-sqltools
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-sqltools/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: xvfb-run -a npm test

      # E2E needs secrets, which are unavailable to PRs from forks. Run only on
      # push or same-repo PRs; fork PRs run unit tests only.
      - name: Check E2E secrets
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          KEBOOLA_TOKEN: ${{ secrets.KEBOOLA_TOKEN }}
        run: |
          if [ -z "$KEBOOLA_TOKEN" ]; then
            echo "::error::KEBOOLA_TOKEN secret is not set — E2E tests cannot run. Configure it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Integration tests
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: npm run test:integration
        env:
          KEBOOLA_STACK: ${{ secrets.KEBOOLA_STACK }}
          KEBOOLA_TOKEN: ${{ secrets.KEBOOLA_TOKEN }}
          KEBOOLA_WORKSPACE_ID: ${{ secrets.KEBOOLA_WORKSPACE_ID }}
          KEBOOLA_BRANCH_ID: ${{ secrets.KEBOOLA_BRANCH_ID }}
          KEBOOLA_TEST_QUERY: ${{ secrets.KEBOOLA_TEST_QUERY }}
