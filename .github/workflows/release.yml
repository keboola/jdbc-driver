name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-sqltools/package-lock.json

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build JDBC driver jar
        working-directory: jdbc-driver
        run: |
          mvn -B -Drevision=${{ steps.version.outputs.version }} clean package -DskipTests
          mkdir -p dist
          cp target/keboola-jdbc-driver-*.jar dist/

      - name: Build VSCode extension VSIX
        working-directory: vscode-sqltools
        run: |
          npm ci
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
          npm run package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jdbc-driver/dist/keboola-jdbc-driver-*.jar
            vscode-sqltools/sqltools-keboola-driver-*.vsix
          fail_on_unmatched_files: true
          generate_release_notes: true
